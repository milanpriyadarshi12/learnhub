<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password - LearnHub</title>
  <meta name="description" content="Reset your LearnHub account password.">
  
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
  
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: { primary: '#6366f1', 'primary-dark': '#4f46e5', secondary: '#0ea5e9' },
          fontFamily: { sans: ['Inter', 'sans-serif'] },
        },
      },
    }
  </script>
  <!-- Premium Page Loader -->
  <link rel="stylesheet" href="css/loader.css">
  <link rel="stylesheet" href="css/auth.css">
</head>
<body class="font-sans">
  <script src="js/loader.js"></script>

  <div class="auth-container">
    <!-- Background Shapes -->
    <div class="auth-bg-shapes">
      <div class="auth-shape auth-shape-1"></div>
      <div class="auth-shape auth-shape-2"></div>
      <div class="auth-shape auth-shape-3"></div>
    </div>
    
    <!-- Forgot Password Card -->
    <div class="auth-card">
      <!-- Logo -->
      <a href="index.html" class="flex items-center justify-center gap-2 mb-8">
        <div class="w-12 h-12 bg-primary rounded-xl flex items-center justify-center">
          <i class="fas fa-graduation-cap text-white text-xl"></i>
        </div>
        <span class="text-2xl font-bold text-gray-800">LearnHub</span>
      </a>
      
      <!-- Icon -->
      <div class="w-20 h-20 bg-primary/10 rounded-full flex items-center justify-center mx-auto mb-6">
        <i class="fas fa-key text-primary text-3xl"></i>
      </div>
      
      <h2 class="text-2xl font-bold text-gray-800 text-center mb-2">Forgot Password?</h2>
      <p class="text-gray-500 text-center mb-8">No worries! Enter your email and we'll send you a reset link.</p>
      
      <form>
        <!-- Email -->
        <div class="form-group">
          <label class="form-label">Email Address</label>
          <div class="form-input-icon">
            <i class="fas fa-envelope icon"></i>
            <input type="email" class="form-input" placeholder="Enter your registered email" required>
          </div>
        </div>
        
        <!-- Submit Button -->
        <button type="submit" class="btn btn-primary w-full mb-6">
          Send Reset Link <i class="fas fa-paper-plane ml-2"></i>
        </button>
      </form>
      
      <!-- Back to Login -->
      <p class="text-center">
        <a href="login.html" class="text-gray-600 hover:text-primary flex items-center justify-center gap-2">
          <i class="fas fa-arrow-left"></i>
          Back to Login
        </a>
      </p>
    </div>
  </div>
  <script src="js/database.js"></script>
  <script src="js/auth.js"></script>


  <script src="js/script.js"></script>
  <!-- AI Translator Widget -->
  <script src="js/translator.js" defer></script>
</body>
</html>
